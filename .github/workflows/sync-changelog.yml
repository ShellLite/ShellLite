name: Sync Changelog to Website

on:
  push:
    branches:
      - main
    paths:
      - 'MISC/CHANGELOG.md'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout ShellLite
        uses: actions/checkout@v4

      - name: Checkout ShellLite-Website
        uses: actions/checkout@v4
        with:
          repository: ShellLite/ShellLite-Website
          token: ${{ secrets.WEBSITE_SYNC_TOKEN }}
          path: website

      - name: Update Changelog on Website
        env:
          SYNC_TOKEN: ${{ secrets.WEBSITE_SYNC_TOKEN }}
        run: |
          if [ -z "$SYNC_TOKEN" ]; then
            echo "Error: WEBSITE_SYNC_TOKEN is not set in secrets."
            exit 1
          fi
          cp MISC/CHANGELOG.md website/public/docs/Changelog.md
          cd website
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/docs/Changelog.md
          git commit -m "Auto-update changelog from ShellLite [skip ci]" || echo "No changes to commit"
          git push origin main

      - name: Trigger VM Deploy
        run: |
          curl -s http://shelllite.tech/deploy-webhook-secret-99
